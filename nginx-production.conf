# =============================================================================
# PRODUCTION NGINX CONFIGURATION FOR EXAMS.JEFF.AZ
# =============================================================================
# This is a hardened Nginx reverse proxy configuration for the exam platform
# Place this file at: /etc/nginx/sites-available/aimentor
# Enable with: sudo ln -s /etc/nginx/sites-available/aimentor /etc/nginx/sites-enabled/
# =============================================================================

# Rate limiting zones (prevents abuse)
limit_req_zone $binary_remote_addr zone=general:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=ai:10m rate=10r/m;

# Connection limiting (prevents resource exhaustion)
limit_conn_zone $binary_remote_addr zone=addr:10m;

# Cache for static assets
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=static_cache:10m max_size=100m inactive=60m use_temp_path=off;

# Upstream application server
upstream nextjs_backend {
    server 127.0.0.1:3000 fail_timeout=10s max_fails=3;
    keepalive 32;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name exams.jeff.az www.exams.jeff.az;

    # Allow Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name exams.jeff.az www.exams.jeff.az;

    # SSL Certificate paths (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/exams.jeff.az/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/exams.jeff.az/privkey.pem;

    # SSL Configuration (Modern, secure settings)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/exams.jeff.az/chain.pem;

    # Security Headers (defense in depth with Next.js middleware)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Default: block camera, microphone, geolocation (will be overridden for exam pages)
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Logging
    access_log /var/log/nginx/aimentor_access.log;
    error_log /var/log/nginx/aimentor_error.log warn;

    # Request size limits (prevent memory exhaustion)
    client_max_body_size 50M;           # Maximum upload size
    client_body_buffer_size 128k;       # Buffer for request body
    client_header_buffer_size 1k;       # Buffer for headers
    large_client_header_buffers 4 16k;  # Large header buffer

    # Timeouts (prevent slowloris and hung connections)
    client_body_timeout 12s;
    client_header_timeout 12s;
    keepalive_timeout 15s;
    send_timeout 10s;

    # Connection limits (per IP)
    limit_conn addr 10;

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~ /\.env {
        deny all;
        return 404;
    }

    # Health check endpoint (no rate limiting)
    location /api/health {
        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # Auth endpoints (strict rate limiting)
    location ~ ^/api/auth/(signin|callback|signout) {
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Longer timeout for auth operations
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
    }

    # Upload endpoints (moderate rate limiting)
    location ~ ^/api/admin/upload {
        limit_req zone=upload burst=5 nodelay;
        limit_req_status 429;

        # Allow large file uploads (up to 50MB for audio files)
        client_max_body_size 50M;
        client_body_buffer_size 1M;

        # Increase timeout for uploads
        client_body_timeout 60s;
        proxy_read_timeout 90s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 90s;

        # Disable buffering for large uploads
        proxy_request_buffering off;
        proxy_buffering off;

        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AI endpoints (rate limiting to prevent API abuse)
    location ~ ^/api/attempts/.+/(writing|speaking)/(ai-score|transcribe) {
        limit_req zone=ai burst=5 nodelay;
        limit_req_status 429;

        # Longer timeout for AI processing
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;

        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cron endpoints (localhost only - very restrictive)
    location ~ ^/api/cron/ {
        # Only allow from localhost
        allow 127.0.0.1;
        allow ::1;
        deny all;

        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        access_log /var/log/nginx/cron_access.log;
    }

    # General API endpoints (moderate rate limiting)
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # API timeouts
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;

        # Disable buffering for real-time endpoints
        proxy_buffering off;
    }

    # Static assets (cache and optimize)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://nextjs_backend;
        proxy_cache static_cache;
        proxy_cache_valid 200 60m;
        proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Cache-Status $upstream_cache_status;
        
        # Security headers for static assets
        add_header X-Content-Type-Options "nosniff" always;
        
        access_log off;
    }

    # Audio files (serve directly from filesystem for better performance)
    location ~ ^/audio/ {
        # Serve from the public directory
        alias /root/examsJeff/public/audio/;
        
        # Allow range requests for audio seeking
        add_header Accept-Ranges bytes;
        
        # CORS headers (if needed for cross-origin requests)
        add_header Access-Control-Allow-Origin *;
        
        # Cache headers
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        
        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        
        # Correct MIME types
        types {
            audio/mpeg mp3;
            audio/wav wav;
            audio/ogg ogg;
            audio/mp4 m4a;
            audio/aac aac;
            audio/flac flac;
            audio/x-ms-wma wma;
            audio/webm webm;
        }
        
        # Rate limiting
        limit_req zone=general burst=10 nodelay;
        
        # Logging
        access_log /var/log/nginx/audio_access.log;
        error_log /var/log/nginx/audio_error.log;
    }

    # Image files (serve directly from filesystem)
    location ~ ^/images/ {
        # Serve from the public directory
        alias /root/examsJeff/public/images/;
        
        # Cache headers
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        
        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        
        # Rate limiting
        limit_req zone=general burst=10 nodelay;
        
        # Logging
        access_log off;
    }

    # Exam pages (allow microphone for speaking tests)
    location ~ ^/attempts/.+/run$ {
        limit_req zone=general burst=10 nodelay;
        limit_req_status 429;

        # Override Permissions-Policy to allow microphone for exam pages
        add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;
        
        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Longer timeout for exam sessions
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;

        # Enable compression
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    }

    # Next.js pages and app routes (general rate limiting)
    location / {
        limit_req zone=general burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Page load timeouts
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;

        # Enable compression
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    }

    # Error pages
    error_page 429 /429.html;
    location = /429.html {
        internal;
        default_type text/html;
        return 429 '<!DOCTYPE html><html><head><title>Too Many Requests</title></head><body><h1>429 Too Many Requests</h1><p>You have exceeded the rate limit. Please try again later.</p></body></html>';
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
        internal;
        default_type text/html;
        return 503 '<!DOCTYPE html><html><head><title>Service Unavailable</title></head><body><h1>503 Service Unavailable</h1><p>The service is temporarily unavailable. Please try again in a few moments.</p></body></html>';
    }
}

# =============================================================================
# SECURITY NOTES:
# =============================================================================
# 1. Test configuration: sudo nginx -t
# 2. Reload after changes: sudo systemctl reload nginx
# 3. Monitor logs: sudo tail -f /var/log/nginx/aimentor_error.log
# 4. Check rate limiting: grep "limiting requests" /var/log/nginx/aimentor_error.log
# 5. Adjust rate limits based on legitimate traffic patterns
# 6. Consider adding fail2ban for repeated 429 responses
# 7. Update SSL certificate paths if using different paths
# 8. Rotate logs: configure logrotate for /var/log/nginx/aimentor_*
# =============================================================================
